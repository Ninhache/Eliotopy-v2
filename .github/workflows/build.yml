name: build

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure - Helper
        run: cmake --help

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DELIOTOPY_AUTO_UPDATE=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eliotopy
          path: build/Release/Eliotopy.exe
          retention-days: 14
